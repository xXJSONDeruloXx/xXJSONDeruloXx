name: Update README metrics

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update Decky plugin install counts
        run: python3 .github/scripts/update_readme_metrics.py
      - name: Commit changes
        run: |
          if git diff --quiet README.md; then
            echo "README metrics already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update README metrics"
          git push
